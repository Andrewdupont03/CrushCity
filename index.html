<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #17212b; color: white; padding: 15px; margin: 0; }
        
        /* Grille des profils */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background-color: #242f3d; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #2c3b4a; }
        
        .profile-pic {
            width: 100%;
            height: 150px;                    /* hauteur fixe → cartes toujours identiques */
            object-fit: contain;              /* photo entière visible sans recadrage */
            border-radius: 10px;
            background-color: #17212b;        /* fond sombre pour les espaces vides */
        }
        
        .action-btn { background-color: #e5a322 !important; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .verified { color: #3390ec; }

        /* Style de l'état vide (Empty State) */
        #empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            margin-top: 50px;
        }
        .empty-icon { font-size: 60px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .empty-title { font-size: 20px; font-weight: bold; color: #e5a322; margin-bottom: 10px; }
        .empty-text { color: #8fa1b3; font-size: 14px; line-height: 1.5; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color: #ffffff;">🔥 Profils Vérifiés</h2>
    </div>

    <div class="grid" id="profile-grid"></div>

    <div id="empty-state">
        <div class="empty-icon">✨</div>
        <div class="empty-title">Bientôt de nouveaux profils !</div>
        <div class="empty-text">
            Notre équipe vérifie actuellement de nouveaux profils VIP.<br>
            Reviens d'ici quelques minutes pour ne rien rater.
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        
        const grid = document.getElementById('profile-grid');
        const emptyState = document.getElementById('empty-state');

        fetch('profiles.json')
            .then(response => response.json())
            .then(data => {
                // Vérifier si la liste est vide ou n'existe pas
                if (!data || data.length === 0) {
                    grid.style.display = 'none';
                    emptyState.style.display = 'flex';
                } else {
                    grid.style.display = 'grid';
                    emptyState.style.display = 'none';
                    
                    data.forEach(p => {
                        grid.innerHTML += `
                            <div class="card">
                                <img src="${p.photo}" class="profile-pic" onerror="this.src='https://via.placeholder.com/150'">
                                <div style="margin-top:10px; font-weight:bold;">${p.nom}, ${p.age} <span class="verified">✅</span></div>
                                <p style="font-size:12px; color:#8fa1b3;">${p.ville}</p>
                                <button class="action-btn" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/${p.user.replace('@','')}')">💬 Discuter</button>
                            </div>`;
                    });
                }
            })
            .catch(error => {
                console.error("Erreur:", error);
                grid.style.display = 'none';
                emptyState.style.display = 'flex';
                document.querySelector('.empty-title').innerText = "Oups !";
                document.querySelector('.empty-text').innerText = "Impossible de charger les profils pour le moment.";
            });
    </script>
</body>
</html>
